# Стандартные OID (RFC 2863) - используются если нет специфичных для вендора
default:
  system:
    sys_descr: "1.3.6.1.2.1.1.1.0"
    sys_object_id: "1.3.6.1.2.1.1.2.0"
    sys_location: "1.3.6.1.2.1.1.6.0"
    sys_contact: "1.3.6.1.2.1.1.4.0"
    sys_name: "1.3.6.1.2.1.1.5.0"
    sys_up_time: "1.3.6.1.2.1.1.3.0"
    serial: "1.3.6.1.2.1.47.1.1.1.1.11.1"  # entPhysicalSerialNum

  interfaces:
    if_name: "1.3.6.1.2.1.2.2.1.2.{ifIndex}"
    if_type: "1.3.6.1.2.1.2.2.1.3.{ifIndex}"
    if_speed: "1.3.6.1.2.1.2.2.1.5.{ifIndex}"
    if_speed_high: "1.3.6.1.2.1.31.1.1.1.15.{ifIndex}"  # ifHighSpeed (64-bit)
    if_admin_status: "1.3.6.1.2.1.2.2.1.7.{ifIndex}"
    if_oper_status: "1.3.6.1.2.1.2.2.1.8.{ifIndex}"
    if_mtu: "1.3.6.1.2.1.2.2.1.4.{ifIndex}"
    if_last_change: "1.3.6.1.2.1.2.2.1.9.{ifIndex}"
    in_octets: "1.3.6.1.2.1.2.2.1.10.{ifIndex}"
    out_octets: "1.3.6.1.2.1.2.2.1.16.{ifIndex}"
    in_unicast_pkts: "1.3.6.1.2.1.2.2.1.11.{ifIndex}"
    out_unicast_pkts: "1.3.6.1.2.1.2.2.1.17.{ifIndex}"
    in_errors:
      - "1.3.6.1.2.1.2.2.1.14.{ifIndex}"      # ifInErrors
      - "1.3.6.1.2.1.31.1.1.1.5.{ifIndex}"    # ifHCInErrors (64-bit, если есть)
    out_errors:
      - "1.3.6.1.2.1.2.2.1.20.{ifIndex}"      # ifOutErrors
      - "1.3.6.1.2.1.31.1.1.1.6.{ifIndex}"    # ifHCOutErrors
    in_discards:
      - "1.3.6.1.2.1.2.2.1.13.{ifIndex}"     # ifInDiscards
      - "1.3.6.1.2.1.31.1.1.1.3.{ifIndex}"    # ifHCInDiscards
    out_discards:
      - "1.3.6.1.2.1.2.2.1.19.{ifIndex}"     # ifOutDiscards
      - "1.3.6.1.2.1.31.1.1.1.4.{ifIndex}"    # ifHCOutDiscards
    in_broadcast_pkts: "1.3.6.1.2.1.31.1.1.1.9.{ifIndex}"
    out_broadcast_pkts: "1.3.6.1.2.1.31.1.1.1.10.{ifIndex}"
    in_multicast_pkts: "1.3.6.1.2.1.31.1.1.1.7.{ifIndex}"
    out_multicast_pkts: "1.3.6.1.2.1.31.1.1.1.8.{ifIndex}"
    in_unknown_protos: "1.3.6.1.2.1.2.2.1.15.{ifIndex}"
    out_qlength: "1.3.6.1.2.1.2.2.1.21.{ifIndex}"

  # CDP соседи
  cdp:
    base_oid: "1.3.6.1.4.1.9.9.23.1.2.1.1"
    neighbor_device_id: "6"
    local_port: "7"
    platform: "8"

  # LLDP соседи
  lldp:
    base_oid: "1.0.8802.1.1.2.1.4.1.1"
    chassis _id: "5"
    remote_port: "6"
    local_port: "7"
    sys_name: "9"

# Специфичные OID для Huawei
huawei:
  system:
    serial: "1.3.6.1.4.1.2011.6.2.1.1.1.5"
    hardware: "1.3.6.1.4.1.2011.6.2.1.1.1.6"
    software: "1.3.6.1.4.1.2011.6.2.1.1.1.7"
  interfaces:
    # Для Huawei пробуем стандартные OID, но если не сработает - вернется []
    in_errors:
      - "1.3.6.1.2.1.2.2.1.14.{ifIndex}"      # ifInErrors
      - "1.3.6.1.2.1.31.1.1.1.5.{ifIndex}"    # ifHCInErrors (попытка получить 64-битные)
    out_errors:
      - "1.3.6.1.2.1.2.2.1.20.{ifIndex}"
      - "1.3.6.1.2.1.31.1.1.1.6.{ifIndex}"
    in_discards:
      - "1.3.6.1.2.1.2.2.1.13.{ifIndex}"
      - "1.3.6.1.2.1.31.1.1.1.3.{ifIndex}"
    out_discards:
      - "1.3.6.1.2.1.2.2.1.19.{ifIndex}"
      - "1.3.6.1.2.1.31.1.1.1.4.{ifIndex}"

