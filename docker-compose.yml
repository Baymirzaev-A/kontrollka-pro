version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kontrollka_db
    restart: always
    environment:
      POSTGRES_DB: kontrollka
      POSTGRES_USER: kontrollka
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kontrollka_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kontrollka"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:alpine
    container_name: kontrollka_redis
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    volumes:
      - redis_data:/data
    networks:
      - kontrollka_network
    command: redis-server --appendonly yes

  kontrollka:
    build: .
    container_name: kontrollka
    restart: always
    ports:
      - "5000:5000"
    #expose:
    #  - "5000"                 после разворачивания nginx
    environment:
      # Основные
      - DARIA_API_URL=https://127.0.0.1:8000
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://kontrollka:${DB_PASSWORD}@postgres:5432/kontrollka
      - REDIS_URL=redis://redis:6379
      - HOST=0.0.0.0
      - PORT=5000

      # Аутентификация
      - AUTH_MODE=${AUTH_MODE:-local}

      # LDAP
      - LDAP_SERVER=${LDAP_SERVER}
      - LDAP_DOMAIN=${LDAP_DOMAIN}
      - LDAP_BASE_DN=${LDAP_BASE_DN}
      - LDAP_BIND_USER=${LDAP_BIND_USER}
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD}
      - AD_GROUP_ADMIN=${AD_GROUP_ADMIN}
      - AD_GROUP_OPERATOR=${AD_GROUP_OPERATOR}
      - AD_GROUP_VIEWER=${AD_GROUP_VIEWER}

      # Учетные данные
      - DEVICE_USERNAME=${DEVICE_USERNAME:-admin}
      - DEVICE_PASSWORD=${DEVICE_PASSWORD:-admin}
      - DEVICE_ENABLE=${DEVICE_ENABLE}
      - SERVER_USERNAME=${SERVER_USERNAME:-root}
      - SERVER_PASSWORD=${SERVER_PASSWORD}
      - SERVER_KEY_FILE=${SERVER_KEY_FILE}

      # Gunicorn
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-4}
      - GUNICORN_WORKER_CLASS=${GUNICORN_WORKER_CLASS:-eventlet}


    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./certs:/app/certs:ro
      - ./ssh_keys:/app/ssh_keys:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kontrollka_network
  # РАСКОММЕНТИРОВАТЬ ДЛЯ МАСШТАБИРОВАНИЯ (будет 3 реплики)
  # deploy:
  #   mode: replicated
  #   replicas: 3

  celery-worker:
    build:
      context: ./ansible-worker
      dockerfile: dockerfile
    container_name: kontrollka_celery_worker
    restart: always
    deploy:
      mode: replicated
      replicas: ${CELERY_WORKERS:-3}
    command: celery -A celery_app worker --beat --concurrency=${CELERY_CONCURRENCY:-5} --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DEVICE_USERNAME=${DEVICE_USERNAME:-admin}
      - DEVICE_PASSWORD=${DEVICE_PASSWORD:-admin}
    volumes:
      - ./ansible-worker:/app
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - kontrollka_network

  #nginx:
    #image: nginx:alpine
   # container_name: kontrollka_nginx
   # restart: always
   # ports:
    #  - "80:80"
     # - "443:443"
    #volumes:
     # - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./certs:/certs:ro
    #networks:
    #  - kontrollka_network
    #depends_on:
    #  - kontrollka

volumes:
  postgres_data:
  redis_data:

networks:
  kontrollka_network:
    external: true