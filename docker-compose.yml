version: '3.8'

services:
  kontrollka:
    image: baymirzaev/kontrollka-pro:latest
    container_name: kontrollka
    restart: always
    ports:
      - "5000:5000"
    environment:
      # Основные настройки
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=sqlite:///data/devices.db
      - HOST=0.0.0.0
      - PORT=5000

      # HTTPS
      - SSL_CERT=/certs/kontrollka.crt
      - SSL_KEY=/certs/kontrollka.key

      # Аутентификация
      - AUTH_MODE=${AUTH_MODE:-local}

      # LDAP (если AUTH_MODE=ldap)
      - LDAP_SERVER=${LDAP_SERVER}
      - LDAP_DOMAIN=${LDAP_DOMAIN}
      - LDAP_BASE_DN=${LDAP_BASE_DN}
      - LDAP_BIND_USER=${LDAP_BIND_USER}
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD}
      - AD_GROUP_ADMIN=${AD_GROUP_ADMIN}
      - AD_GROUP_OPERATOR=${AD_GROUP_OPERATOR}
      - AD_GROUP_VIEWER=${AD_GROUP_VIEWER}

      # Учетные данные для сетевого оборудования
      - DEVICE_USERNAME=${DEVICE_USERNAME:-admin}
      - DEVICE_PASSWORD=${DEVICE_PASSWORD:-admin}
      - DEVICE_ENABLE=${DEVICE_ENABLE}

      # Учетные данные для серверов (Linux/Unix)
      - SERVER_USERNAME=${SERVER_USERNAME:-root}
      - SERVER_PASSWORD=${SERVER_PASSWORD}
      - SERVER_KEY_FILE=${SERVER_KEY_FILE}

      # Redis для координации WebSocket (опционально)
      - REDIS_URL=${REDIS_URL}

    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./certs:/certs:ro
      - ./ssh_keys:/app/ssh_keys:ro  # для SSH-ключей серверов
    networks:
      - kontrollka_network

networks:
  kontrollka_network:
    driver: bridge