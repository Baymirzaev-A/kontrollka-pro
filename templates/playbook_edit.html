{% extends "base.html" %}

{% block title %}Редактировать playbook{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>✏️ Редактировать playbook</h2>
        <a href="/ansible" class="btn btn-secondary">← Назад</a>
    </div>

    <div style="margin-top: 1rem;">
        <div style="margin-bottom: 1rem;">
            <label for="playbook-name" style="display: block; margin-bottom: 0.5rem;">Название:</label>
            <input type="text" id="playbook-name" value="{{ playbook.name }}" style="width: 100%; padding: 0.5rem;">
        </div>

        <div style="margin-bottom: 1rem;">
            <label for="playbook-description" style="display: block; margin-bottom: 0.5rem;">Описание:</label>
            <input type="text" id="playbook-description" value="{{ playbook.description }}" style="width: 100%; padding: 0.5rem;">
        </div>

        <div style="margin-bottom: 1rem;">
            <label for="playbook-content" style="display: block; margin-bottom: 0.5rem;">Содержимое:</label>
            <textarea id="playbook-content" style="width: 100%; height: 400px; font-family: monospace; padding: 1rem;">{{ playbook.content }}</textarea>
        </div>
    </div>

    <div style="margin-top: 1rem;">
        <button onclick="savePlaybook()" class="btn btn-success">💾 Сохранить</button>
        <button onclick="runPlaybook()" class="btn btn-primary">🚀 Запустить</button>
    </div>
</div>

<script>
    const playbookId = {{ playbook.id }};

    async function savePlaybook() {
        const name = document.getElementById('playbook-name').value;
        const description = document.getElementById('playbook-description').value;
        const content = document.getElementById('playbook-content').value;

        if (!name) {
            alert('❌ Название playbook обязательно');
            return;
        }

        const response = await fetch(`/ansible/api/playbooks/${playbookId}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                name: name,
                description: description,
                content: content,
                is_shared: false
            })
        });

        if (response.ok) {
            alert('✅ Playbook сохранён');
        } else {
            alert('❌ Ошибка сохранения');
        }
    }

    async function runPlaybook() {
        if (!confirm('Запустить playbook?')) return;

        try {
            // 1. Запускаем playbook на всех устройствах
            const response = await fetch(`/ansible/api/playbooks/${playbookId}/run`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({device_ids: []})  // <-- ПУСТОЙ МАССИВ = ВСЕ УСТРОЙСТВА
            });

            if (!response.ok) {
                const text = await response.text();
                alert(`Ошибка ${response.status}: ${text.substring(0, 200)}`);
                return;
            }

            const data = await response.json();

            if (!data.task_id) {
                alert('Ошибка: не получен ID задачи');
                return;
            }

            const taskId = data.task_id;
            console.log('Task started:', taskId);

            // 2. Ждем результат с проверкой каждые 2 секунды
            let attempts = 0;
            const maxAttempts = 60; // 2 минуты максимум

            const checkInterval = setInterval(async () => {
                attempts++;

                try {
                    const statusRes = await fetch(`/ansible/api/playbooks/task/${taskId}/status`);
                    const statusData = await statusRes.json();

                    if (statusData.status === 'running') {
                        console.log(`Waiting... ${attempts}/${maxAttempts}`);
                        return;
                    }

                    // Получили результат
                    clearInterval(checkInterval);

                    if (statusData.success) {
                        alert('✅ Playbook выполнен успешно');
                        console.log('STDOUT:', statusData.stdout);
                        console.log('STDERR:', statusData.stderr);
                    } else {
                        const errorMsg = statusData.error || statusData.stderr || 'Неизвестная ошибка';
                        alert('❌ Ошибка: ' + errorMsg);
                        console.error('Full response:', statusData);
                    }

                } catch (err) {
                    clearInterval(checkInterval);
                    alert('Ошибка при проверке статуса: ' + err.message);
                }

                if (attempts >= maxAttempts) {
                    clearInterval(checkInterval);
                    alert('⏰ Таймаут: задача выполняется слишком долго');
                }
            }, 2000);

        } catch (err) {
            alert('Ошибка: ' + err.message);
        }
    }
</script>
{% endblock %}
