{% extends "base.html" %}

{% block title %}Редактировать playbook{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>✏️ Редактировать: {{ name }}</h2>
        <a href="/ansible" class="btn btn-secondary">← Назад</a>
    </div>
    
    <div style="margin-top: 1rem;">
        <textarea id="playbook-content" style="width: 100%; height: 400px; font-family: monospace; padding: 1rem;"></textarea>
    </div>
    
    <div style="margin-top: 1rem;">
        <button onclick="savePlaybook()" class="btn btn-success">💾 Сохранить</button>
        <button onclick="runPlaybook()" class="btn btn-primary">🚀 Запустить</button>
    </div>
</div>

<script>
    const playbookName = "{{ name }}";
    
    async function loadPlaybook() {
        const response = await fetch(`/ansible/api/playbooks/${playbookName}`);
        const data = await response.json();
        document.getElementById('playbook-content').value = data.content;
    }
    
    async function savePlaybook() {
        const content = document.getElementById('playbook-content').value;
        await fetch(`/ansible/api/playbooks/${playbookName}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({content: content})
        });
        alert('✅ Playbook сохранён');
    }
    
    async function runPlaybook() {
        if (!confirm('Запустить playbook?')) return;
        
        const response = await fetch(`/ansible/api/playbooks/${playbookName}/run`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({})
        });
        const data = await response.json();
        
        if (data.success) {
            alert('✅ Playbook выполнен успешно');
            console.log(data.stdout);
        } else {
            alert('❌ Ошибка: ' + (data.error || data.stderr));
        }
    }
    
    loadPlaybook();
</script>
{% endblock %}
