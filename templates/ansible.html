{% extends "base.html" %}

{% block title %}Ansible{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>📦 Ansible Playbooks (ТЕСТОВЫЙ РЕЖИМ)</h2>
        <button class="btn btn-success" onclick="createPlaybook()">➕ Создать playbook</button>
    </div>
    
    <div id="playbooks-list" style="margin-top: 1rem;">
        <div class="loading">Загрузка...</div>
    </div>
</div>

<script>
    async function loadPlaybooks() {
        const container = document.getElementById('playbooks-list');
        try {
            const response = await fetch('/ansible/api/playbooks');
            const playbooks = await response.json();
            
            if (playbooks.length === 0) {
                container.innerHTML = '<div class="alert alert-info">📭 Нет playbooks. Создайте первый!</div>';
                return;
            }
            
            container.innerHTML = playbooks.map(p => `
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 1rem; border: 1px solid #dee2e6; border-radius: 5px; margin-bottom: 0.5rem;">
                    <div>
                        <strong>📄 ${p.name}</strong>
                        ${p.description ? `<br><small>${p.description}</small>` : ''}
                    </div>
                    <div>
                        <button class="btn btn-sm btn-primary" onclick="editPlaybook(${p.id})">✏️ Редактировать</button>
                        <button class="btn btn-sm btn-success" onclick="runPlaybook(${p.id})">🚀 Запустить</button>
                        <button class="btn btn-sm btn-danger" onclick="deletePlaybook(${p.id})">🗑️ Удалить</button>
                    </div>
                </div>
            `).join('');
        } catch (error) {
            container.innerHTML = '<div class="alert alert-danger">Ошибка загрузки</div>';
        }
    }

    function createPlaybook() {
        const name = prompt('Введите имя playbook (например: update-config.yml):');
        if (!name) return;

        const content = `---
- name: Пример playbook
  hosts: all
  tasks:
    - name: Выполнить команду show version
      community.network.ce_command:
        commands: display version
      register: output

    - name: Показать вывод
      ansible.builtin.debug:
        var: output.stdout
`;

        fetch('/ansible/api/playbooks', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                name: name,
                content: content,
                description: '',
                is_shared: false
            })
        }).then(() => loadPlaybooks());
    }

    function editPlaybook(id) {
        window.location.href = `/ansible/playbook/${id}`;
    }

    function runPlaybook(id) {
        if (!confirm(`Запустить playbook?`)) return;

        fetch(`/ansible/api/playbooks/${id}/run`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({device_ids: []})  // ID устройства
        })
        .then(response => {
            if (!response.ok) {
                return response.text().then(text => { throw new Error(`HTTP ${response.status}: ${text.substring(0, 200)}`); });
            }
            return response.json();
        })
        .then(data => {
            if (!data.task_id) {
                alert('Ошибка: не получен ID задачи');
                return;
            }

            const taskId = data.task_id;
            alert(`✅ Playbook запущен (ID: ${taskId}). Результат будет в консоли.`);
            console.log(`Task ID: ${taskId}`);

            // Проверяем результат через 5 секунд
            setTimeout(async () => {
                const res = await fetch(`/ansible/api/playbooks/task/${taskId}/status`);
                const result = await res.json();
                console.log('Result:', result);
                if (result.success) {
                    console.log('STDOUT:', result.stdout);
                } else {
                    console.error('ERROR:', result.stderr);
                }
            }, 5000);
        })
        .catch(error => {
            alert('❌ Ошибка: ' + error.message);
            console.error(error);
        });
    }

    function deletePlaybook(id) {
        if (!confirm(`Удалить playbook?`)) return;

        fetch(`/ansible/api/playbooks/${id}`, {
            method: 'DELETE'
        }).then(() => loadPlaybooks());
    }
    
    loadPlaybooks();
</script>

<style>
.loading {
    text-align: center;
    padding: 2rem;
    color: #6c757d;
}
.btn-sm {
    margin: 0 2px;
}
</style>
{% endblock %}
