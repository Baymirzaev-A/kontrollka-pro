{% extends "base.html" %}

{% block title %}Редактирование {{ device.name }}{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>✏️ Редактирование устройства</h2>
    </div>

    <form method="POST" action="/device/{{ device.id }}/update" style="max-width: 600px;">
        <div class="form-group">
            <label>Имя устройства:</label>
            <input type="text" name="name" class="form-control" value="{{ device.name }}" required>
        </div>

        <div class="form-group">
            <label>IP адрес:</label>
            <input type="text" name="host" class="form-control" value="{{ device.host }}" required>
        </div>

        <div class="form-group">
            <label>Тип устройства:</label>
            <select name="device_type" class="form-control">
                <option value="huawei" {% if device.device_type == 'huawei' %}selected{% endif %}>Huawei</option>
                <option value="cisco_ios" {% if device.device_type == 'cisco_ios' %}selected{% endif %}>Cisco IOS</option>
                <option value="arista_eos" {% if device.device_type == 'arista_eos' %}selected{% endif %}>Arista EOS</option>
                <option value="juniper" {% if device.device_type == 'juniper' %}selected{% endif %}>Juniper</option>
            </select>
        </div>

        <div class="form-group">
            <label>Порт SSH:</label>
            <input type="number" name="port" class="form-control" value="{{ device.port }}">
        </div>

        <div class="form-group">
            <label>Описание:</label>
            <input type="text" name="description" class="form-control" value="{{ device.description or '' }}">
        </div>

        <div class="form-group">
            <label>Назначение:</label>
            <select name="purpose" class="form-control">
                <option value="router" {% if device.purpose == 'router' %}selected{% endif %}>Роутер</option>
                <option value="switch" {% if device.purpose == 'switch' %}selected{% endif %}>Коммутатор</option>
                <option value="firewall" {% if device.purpose == 'firewall' %}selected{% endif %}>Файрвол</option>
            </select>
        </div>

        <div style="display: flex; gap: 0.5rem;">
            <button type="submit" class="btn btn-success">💾 Сохранить</button>
            <a href="/" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
