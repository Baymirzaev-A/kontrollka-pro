version: '3.8'

services:
  neo4j:
    image: neo4j:5-enterprise
    container_name: kontrollka_neo4j
    restart: always
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - kontrollka_network
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-changeme}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: kontrollka_clickhouse
    restart: always
    environment:
      CLICKHOUSE_DB: kontrollka_metrics
      CLICKHOUSE_USER: kontrollka
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-changeme}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./init-clickhouse.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "8123:8123"
    networks:
      - kontrollka_network
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  daria-api:
    build: ./daria
    container_name: kontrollka_daria
    restart: always
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-changeme}
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=kontrollka
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-changeme}
    ports:
      - "8000:8000"
    volumes:
      - ./daria/app:/app
    depends_on:
      neo4j:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - kontrollka_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  snmptrapd:
    image: alpine/snmptrapd:latest
    container_name: kontrollka_snmptrapd
    restart: always
    network_mode: host
    volumes:
      - ./daria/config/snmptrapd/snmptrapd.conf:/etc/snmptrapd.conf:ro
      - ./daria/scripts/trap_handler.py:/handler.py:ro
    command: >
      sh -c "apk add --no-cache python3 py3-pip && pip3 install aiohttp && 
             snmptrapd -Lf /dev/stdout -n -m ALL -O n -c /etc/snmptrapd.conf | python3 /handler.py"
    depends_on:
      - ucmdb-api
    healthcheck:
      test: ["CMD", "pgrep", "snmptrapd"]
      interval: 30s
      timeout: 10s
      retries: 3

  tftp:
    image: alpine/tftp
    container_name: kontrollka_tftp
    restart: always
    volumes:
      - tftp_data:/var/tftpboot
    ports:
      - "69:69/udp"
    networks:
      - kontrollka_network
    healthcheck:
      test: [ "CMD", "pgrep", "tftpd" ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  neo4j_data:
  clickhouse_data:
  tftp_data:

networks:
  kontrollka_network:
    external: true